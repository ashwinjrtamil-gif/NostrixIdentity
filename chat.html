<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOSTRIX // WORKSPACE</title>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 300px; border-right: 1px solid rgba(255,255,255,0.1); padding: 40px; }
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 60px; }
        #output { flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.6; color: #ccc; }
        .input-area { border-top: 1px solid #222; padding: 20px 0; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 50px; outline: none; }
        button { background: #fff; color: #000; border: none; padding: 0 30px; border-radius: 50px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-size: 0.7rem; letter-spacing: 3px;">NOSTRIX AI</h2>
        <div id="status" style="font-size: 10px; color: #444; margin-top: 20px;">SYNCING GPU...</div>
    </div>
    <div class="workspace">
        <div id="output">System Initializing...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Execute reasoning...">
            <button onclick="run()">Run</button>
        </div>
    </div>

    <script type="module">
        let engine;
        async function init() {
            engine = await window.webllm.CreateMLCEngine("Phi-3-mini-4k-instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => document.getElementById('status').innerText = `CACHING: ${Math.round(p.progress*100)}%`
            });
            document.getElementById('status').innerText = "ONLINE";
        }
        window.run = async () => {
            const input = document.getElementById('user-input');
            const out = document.getElementById('output');
            const prompt = input.value;
            out.innerHTML += `<div style="color:#0071e3">> ${prompt}</div>`;
            const chunks = await engine.chat.completions.create({ messages: [{role:"user", content: prompt}] });
            out.innerHTML += `<div>${chunks.choices[0].message.content}</div>`;
            input.value = "";
        };
        init();
    </script>
</body>
</html>
