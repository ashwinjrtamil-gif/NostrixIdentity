<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTRIX // NEURAL WORKSPACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #0071e3; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 300px; border-right: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; gap: 30px; }
        .logo { font-weight: 800; font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); }
        .session-tag { font-family: 'JetBrains Mono'; font-size: 9px; color: #444; text-transform: uppercase; }

        /* --- CHAT AREA --- */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 30px 60px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-output { flex: 1; overflow-y: auto; padding: 60px; display: flex; flex-direction: column; gap: 40px; }
        
        .msg { max-width: 800px; line-height: 1.8; font-size: 0.95rem; }
        .ai-msg { color: #ccc; position: relative; padding-left: 20px; border-left: 2px solid var(--accent); }
        .imrad-section { color: var(--accent); font-family: 'JetBrains Mono'; font-weight: 800; font-size: 10px; margin-top: 20px; display: block; text-transform: uppercase; letter-spacing: 2px; }

        .input-container { padding: 40px 60px; border-top: 1px solid var(--border); }
        .input-wrap { background: #0a0a0a; border: 1px solid var(--border); border-radius: 100px; padding: 10px 10px 10px 30px; display: flex; align-items: center; gap: 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 0.9rem; }
        .send-btn { background: #fff; color: #000; padding: 12px 25px; border-radius: 100px; border: none; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        a { color: #444; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">NOSTRIX // ALPHA</div>
    <div class="session-tag">Neural Workspace v2.0</div>
    <div style="margin-top: auto;"><a href="index.html">← Back to Core</a></div>
</aside>

<main class="workspace">
    <header class="chat-header">
        <div style="font-weight: 800; font-size: 0.8rem;">NNRM3_REASONING_ENGINE</div>
        <div style="font-family: 'JetBrains Mono'; font-size: 10px; color: #34c759;">STATUS: ACTIVE</div>
    </header>

    <div class="chat-output" id="output">
        <div class="msg ai-msg">
            <span class="imrad-section">Introduction</span>
            Welcome to the Nostrix Neural Workspace. All inference is processed locally on your hardware. Provide a seed or technical constraint to begin IMRaD synthesis.
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrap">
            <input type="text" id="input" placeholder="Enter engineering request...">
            <button class="send-btn" onclick="send()">Execute</button>
        </div>
    </div>
</main>

<script>
    function send() {
        const inp = document.getElementById('input');
        const out = document.getElementById('output');
        if(!inp.value) return;

        // User Message
        out.innerHTML += `<div class="msg user-msg" style="align-self: flex-end; color: var(--accent); font-weight: 800;">> ${inp.value}</div>`;
        
        // Mock AI for UI testing (Add your engine logic here)
        out.innerHTML += `
            <div class="msg ai-msg">
                <span class="imrad-section">Methods</span>
                Analyzing input constraints through the NNRM3 reasoning mesh...
                <span class="imrad-section">Results</span>
                [Synthesis Pending] - Hardware integration required for full local inference.
            </div>
        `;

        inp.value = "";
        out.scrollTop = out.scrollHeight;
    }
</script>

</body>
</html>
