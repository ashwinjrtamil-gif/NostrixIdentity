<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTRIX // NEURAL WORKSPACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #0071e3; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 300px; border-right: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; gap: 30px; backdrop-filter: blur(20px); }
        .workspace { flex: 1; display: flex; flex-direction: column; }
        .chat-output { flex: 1; overflow-y: auto; padding: 60px; display: flex; flex-direction: column; gap: 40px; scrollbar-width: none; }
        
        .ai-msg { color: #ccc; border-left: 2px solid var(--accent); padding-left: 25px; max-width: 800px; line-height: 1.8; }
        .imrad { color: var(--accent); font-family: 'JetBrains Mono'; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-top: 20px; }

        .input-box { padding: 40px 60px; border-top: 1px solid var(--border); }
        .input-wrap { background: #0a0a0a; border: 1px solid var(--border); border-radius: 100px; padding: 8px 10px 8px 30px; display: flex; gap: 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 0.9rem; }
        .btn { background: #fff; color: #000; padding: 12px 30px; border-radius: 100px; border: none; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }
        a { color: #444; text-decoration: none; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="font-weight: 800; letter-spacing: 3px; font-size: 10px; color: var(--accent);">NOSTRIX // G-ALPHA</div>
    <div style="font-size: 10px; color: #444; font-family: 'JetBrains Mono';">KERNAL: ACTIVE</div>
    <div style="margin-top: auto;"><a href="index.html">← Terminate Session</a></div>
</aside>

<main class="workspace">
    <div class="chat-output" id="output">
        <div class="ai-msg">
            <span class="imrad">Introduction</span>
            System ready. NNRM3 kernel is monitoring local hardware telemetry. Provide engineering constraints for 4M-token deep mining and IMRaD synthesis.
        </div>
    </div>
    <div class="input-box">
        <div class="input-wrap">
            <input type="text" id="input" placeholder="Execute reasoning request...">
            <button class="btn" onclick="send()">Run</button>
        </div>
    </div>
</main>

<script>
    function send() {
        const inp = document.getElementById('input');
        const out = document.getElementById('output');
        if(!inp.value) return;
        out.innerHTML += `<div style="align-self: flex-end; color: var(--accent); font-weight: 800;">> ${inp.value}</div>`;
        out.innerHTML += `<div class="ai-msg"><span class="imrad">Results</span>Synthesis logic pending local GPU sync. 4M context window is stable.</div>`;
        inp.value = "";
        out.scrollTop = out.scrollHeight;
    }
</script>

</body>
</html>
