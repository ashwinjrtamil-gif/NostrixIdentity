<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTRIX V4.6 // WEB-STREAM REFINER</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root { --neon: #00ff41; --bg: #010101; --border: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; padding: 20px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #stats { font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        #progress-container { width: 100%; height: 5px; background: #111; margin-bottom: 15px; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: 0.3s; }

        #terminal { flex-grow: 1; background: #000; border: 1px solid var(--border); padding: 15px; overflow-y: auto; font-size: 13px; line-height: 1.6; margin-bottom: 15px; }
        .log-entry { margin-bottom: 10px; border-left: 2px solid #222; padding-left: 10px; }
        .status { color: #555; font-style: italic; }

        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 12px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="stats">TIV: 0 / 4,000,000 | TPS: 0 | STANDBY</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="terminal">
        <div class="log-entry status">>>> NOSTRIX V4.6 WEB_CORE BOOTED... READY FOR SEED.</div>
    </div>

    <div class="input-area">
        <input type="text" id="seed-input" placeholder="INPUT SEED...">
        <button id="engage-btn" py-click="engage">ENGAGE V4.6</button>
    </div>

    <py-config>
        packages = ["beautifulsoup4"]
    </py-config>

    <script type="py">
        import re, collections, time, asyncio
        from pyodide.http import pyfetch
        from bs4 import BeautifulSoup
        from pyscript import document

        # --- RANKING LOGIC (PORTED FROM YOUR ORIGINAL) ---
        class DynamicRanker:
            def __init__(self):
                self.priority_vocab = collections.Counter({"engine": 10, "specs": 8, "data": 5})
                self.seen_words = collections.Counter()
                self.total_docs = 0

            def update_vocabulary(self, text):
                self.total_docs += 1
                words = re.findall(r'\b[a-z]{5,15}\b', text.lower())
                self.seen_words.update(words)
                for word, count in self.seen_words.most_common(10):
                    self.priority_vocab[word] = round(5 + (count / self.total_docs), 2)

            def score_sentence(self, sentence):
                score = sum(self.priority_vocab.get(w, 0) for w in sentence.lower().split())
                if any(f in sentence.lower() for f in ["click", "subscribe", "cookies"]): score -= 50
                return score

        ranker = DynamicRanker()
        tiv = 0
        start_time = 0

        def log(msg, type="data"):
            term = document.querySelector("#terminal")
            div = document.createElement("div")
            div.className = "log-entry"
            if type == "status": div.classList.add("status")
            div.innerText = f">>> {msg}"
            term.appendChild(div)
            term.scrollTop = term.scrollHeight

        async def engage(event):
            global tiv, start_time
            seed = document.querySelector("#seed-input").value
            if not seed: return
            
            tiv = 0
            start_time = time.time()
            log(f"PHASE 1: BOOTSTRAPPING '{seed.upper()}'", "status")
            
            # Note: Browser requests are CORS-restricted. 
            # In a real tool, you'd use a proxy. Here we simulate the ingestion.
            await run_mission(seed)

        async def run_mission(seed):
            global tiv
            # SIMULATED INGESTION FLOW (Browser safe)
            for i in range(1, 11):
                await asyncio.sleep(0.5) # Simulate network latency
                chunk_size = 400000 + (i * 1234)
                tiv += chunk_size
                
                # Telemetry Update
                elapsed = time.time() - start_time
                tps = int(tiv / elapsed)
                document.querySelector("#stats").innerText = f"TIV: {tiv:,} / 4,000,000 | TPS: {tps:,} | NODE_ACTIVE"
                document.querySelector("#progress-bar").style.width = f"{(tiv/4000000)*100}%"
                
                log(f"[ALGO_LOCK] Found significant node for {seed} chunk {i}")
                
            log("4M MISSION COMPLETE. SOVEREIGN DATA SECURED.", "status")

    </script>
</body>
</html>
