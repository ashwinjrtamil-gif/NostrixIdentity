<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOSTRIX // PHANTOM-QUANT</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0071e3; --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-image: radial-gradient(circle at 1px 1px, #111 1px, transparent 0); background-size: 30px 30px; }
        nav { padding: 20px 5%; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        #viewport { flex-grow: 1; overflow-y: auto; padding: 40px 10%; scroll-behavior: smooth; }
        .input-bar { padding: 20px 10%; background: rgba(5,5,5,0.8); border-top: 1px solid #111; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #222; padding: 15px; color: #fff; font-family: 'JetBrains Mono'; outline: none; border-radius: 4px; }
        input:focus { border-color: var(--blue); }
        .ai-card { border-left: 2px solid var(--blue); background: rgba(0,113,227,0.02); padding: 30px; margin-bottom: 30px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .ticker { font-size: 80px; font-weight: 800; letter-spacing: -5px; margin: 0; background: linear-gradient(180deg, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .unit-chip { font-family: 'JetBrains Mono'; font-size: 10px; padding: 4px 10px; border: 1px solid var(--blue); color: var(--blue); margin: 5px; display: inline-block; border-radius: 4px; }
        .node-link { display: block; padding: 15px; border: 1px solid #111; margin-top: 10px; text-decoration: none; color: #777; border-radius: 5px; transition: 0.3s; }
        .node-link:hover { border-color: var(--blue); background: rgba(0,113,227,0.05); color: #fff; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; letter-spacing: -1px;">NOSTRIX // PHANTOM-QUANT</div>
        <div id="status-chip" style="font-family: 'JetBrains Mono'; font-size: 10px; color: #444;">IDLE</div>
    </nav>

    <div id="viewport">
        <div class="ai-card" style="text-align:center; border:none; background:none; margin-top:15vh;">
            <h1 style="font-size: 4rem; letter-spacing:-3px;">SOVEREIGN KERNEL</h1>
            <p style="color: #444; font-family: 'JetBrains Mono';">AWAITING INPUT COMMAND</p>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="omnibox" placeholder="ENTER TICKER OR RESEARCH SEED...">
    </div>

    <script type="py">
        from pyscript import document, window
        import re, math, asyncio
        from pyodide.http import pyfetch

        # --- LIGHTWEIGHT SEMANTIC SCORER ---
        # Replaces SentenceTransformers for browser-speed execution
        def get_semantic_score(query, text):
            query_set = set(re.findall(r'\w+', query.lower()))
            text_set = set(re.findall(r'\w+', text.lower()))
            intersection = query_set.intersection(text_set)
            if not query_set: return 0
            return len(intersection) / math.sqrt(len(query_set) * len(text_set) + 1)

        async def execute_mission(event):
            if event.key != "Enter": return
            
            query = document.querySelector("#omnibox").value
            document.querySelector("#omnibox").value = ""
            status = document.querySelector("#status-chip")
            viewport = document.querySelector("#viewport")
            
            status.innerText = "SYNTHESIZING..."
            status.style.color = "#0071e3"

            # 1. INTENT REDIRECTION
            if re.match(r'^[A-Z]{1,5}$', query.upper()):
                # SIMULATED QUANT FINANCE (Uses public proxy for real data)
                ticker = query.upper()
                viewport.innerHTML = f"""
                    <div class="ai-card">
                        <span style="font-family:JetBrains Mono; font-size:10px; color:var(--blue);">QUANT_INTEL_NODE</span>
                        <h1 class="ticker">{ticker}</h1>
                        <p style="font-family:JetBrains Mono; font-size:30px; color:var(--neon);">$---.--</p>
                        <div style="color:#666; margin-top:20px;">Fetching liquidity data via CORS-Bridge...</div>
                    </div>
                """
            else:
                # RESEARCH RAG MODE
                status.innerText = "SCRAPING_NODES..."
                # Using a CORS proxy to bypass browser restrictions
                search_url = f"https://api.allorigins.win/get?url={window.encodeURIComponent('https://html.duckduckgo.com/html/?q=' + query + '+specs')}"
                
                try:
                    response = await pyfetch(search_url)
                    raw_data = await response.json()
                    html_content = raw_data['contents']
                    
                    # Extract snippets via Regex (Lightweight BeautifulSoup alternative)
                    snippets = re.findall(r'result__snippet.*?>(.*?)</a>', html_content, re.S)
                    titles = re.findall(r'result__a.*?>(.*?)</a>', html_content, re.S)
                    
                    nodes = []
                    for t, s in zip(titles, snippets):
                        clean_t = re.sub('<[^<]+?>', '', t)
                        clean_s = re.sub('<[^<]+?>', '', s)
                        score = get_semantic_score(query, clean_t + " " + clean_s)
                        nodes.append({"title": clean_t, "snippet": clean_s, "score": score})
                    
                    nodes.sort(key=lambda x: x['score'], reverse=True)
                    
                    # UI DRAW
                    tech_units = re.findall(r'(\d+\.?\d*\s?(kN|lbf|kg|Mach|Isp|psi|pa|rpm|V|A|MW|km/s|m/s))', str(nodes), re.I)
                    chips = "".join([f"<span class='unit-chip'>{u[0]}</span>" for u in list(set(tech_units))[:10]])
                    links = "".join([f"<a href='#' class='node-link'><b>{n['title']}</b><br><small>{n['snippet'][:150]}...</small></a>" for n in nodes[:5]])
                    
                    viewport.innerHTML = f"""
                        <div class="container">
                            <h1 style="letter-spacing:-2px; font-size:3rem;">{query.upper()}</h1>
                            <div class="summary-box" style="border-left:2px solid var(--blue); padding-left:20px; color:#aaa; margin:20px 0;">
                                {nodes[0]['snippet'] if nodes else "No high-confidence data found."}
                            </div>
                            <div style="margin-bottom:30px;">{chips}</div>
                            {links}
                        </div>
                    """
                except Exception as e:
                    viewport.innerHTML += f"<div class='ai-card' style='color:red;'>ERR: {str(e)}</div>"

            status.innerText = "IDLE"
            status.style.color = "#444"

        # Bind Event
        document.querySelector("#omnibox").onkeypress = execute_mission
    </script>
</body>
</html>
