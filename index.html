<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTRIX | Sovereign Stack</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="ashwin-ceo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #f5f5f7; --accent: #0071e3; --border: rgba(255,255,255,0.08); --glass: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { position: fixed; top: 0; width: 100%; padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; }
        .nav-links { display: flex; gap: 40px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #86868b; cursor: pointer; }
        .active-link { color: #fff; }

        .page { display: none; padding: 140px 6%; min-height: 100vh; animation: fadeIn 0.8s ease; }
        .page.active { display: block; }
        
        .hero { text-align: center; padding-top: 10vh; }
        h1 { font-size: clamp(3rem, 10vw, 8rem); font-weight: 800; letter-spacing: -5px; line-height: 0.9; margin-bottom: 30px; }
        
        .bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-top: 60px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 32px; padding: 40px; backdrop-filter: blur(20px); }
        .card-large { grid-column: span 8; } .card-small { grid-column: span 4; }

        .founder-layout { display: flex; align-items: center; gap: 80px; padding: 40px; background: var(--glass); border-radius: 40px; border: 1px solid var(--border); }
        .founder-img { width: 350px; height: 450px; border-radius: 25px; object-fit: cover; filter: grayscale(1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; letter-spacing: 4px; font-size: 0.8rem;">NOSTRIX</div>
    <div class="nav-links">
        <span onclick="showPage('home')">Home</span>
        <span onclick="showPage('founder')">Executive</span>
        <a href="chat.html" style="text-decoration:none; color:var(--accent)">Launch Chat →</a>
    </div>
</nav>

<section id="home" class="page active">
    <div class="hero">
        <h1>SOVEREIGN<br><span style="color:var(--accent)">SYSTEMS.</span></h1>
    </div>
    <div class="bento">
        <div class="card card-large"><h3>4M Context Mining</h3><p>Linear RAG processing for massive datasets.</p></div>
        <div class="card card-small"><h3>Offline Native</h3><p>Zero cloud dependency PWA.</p></div>
    </div>
</section>

<section id="founder" class="page">
    <div class="founder-layout">
        <img src="ashwin-ceo.jpg" alt="CEO" class="founder-img">
        <div>
            <h2 style="font-size: 4rem;">ASHWIN.</h2>
            <p style="color: #86868b; margin-top: 20px;">Founder, CEO, and Chief Engineer of Nostrix.</p>
        </div>
    </div>
</section>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
</script>
</body>
</html>
