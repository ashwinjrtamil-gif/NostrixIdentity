<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOSTRIX // PHANTOM-QUANT WEB</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #0071e3; --neon: #00ff41; --bg: #000; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 1px 1px, #111 1px, transparent 0); background-size: 30px 30px;
        }
        nav { padding: 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        #output-stream { flex-grow: 1; overflow-y: auto; padding: 40px 10%; scroll-behavior: smooth; }
        .input-area { padding: 20px; background: #050505; border-top: 1px solid #111; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #222; padding: 15px; color: #fff; font-family: 'JetBrains Mono'; outline: none; }
        input:focus { border-color: var(--blue); }
        .ai-card { border-left: 2px solid var(--blue); background: rgba(0,113,227,0.03); padding: 20px; margin-bottom: 20px; animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ticker-head { font-size: 80px; font-weight: 800; letter-spacing: -5px; margin: 0; }
        .price-text { font-family: 'JetBrains Mono'; color: var(--neon); font-size: 24px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; letter-spacing: -1px;">NOSTRIX // PHANTOM-QUANT</div>
        <div id="status" style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--blue);">CORE_IDLE</div>
    </nav>

    <div id="output-stream">
        <div class="ai-card">
            <h1 style="letter-spacing: -2px;">SYSTEM_ONLINE</h1>
            <p style="color: #555; font-family: 'JetBrains Mono'; font-size: 12px;">READY FOR QUANTITATIVE RESEARCH OR FINANCIAL ANALYSIS.</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="ENTER TICKER (TSLA) OR RESEARCH QUERY...">
    </div>

    <script type="py">
        from pyscript import document, window
        import asyncio
        import re
        from pyodide.http import pyfetch

        # Proxy to bypass CORS wall
        PROXY = "https://api.allorigins.win/get?url="

        async def fetch_data(url):
            try:
                # We wrap the URL in a proxy to allow the browser to "scrape"
                encoded_url = window.encodeURIComponent(url)
                response = await pyfetch(f"{PROXY}{encoded_url}")
                data = await response.json()
                return data['contents']
            except Exception as e:
                return str(e)

        async def run_engine(event):
            if event.key != "Enter":
                return
            
            query = document.querySelector("#user-input").value
            document.querySelector("#user-input").value = ""
            status = document.querySelector("#status")
            stream = document.querySelector("#output-stream")
            
            status.innerText = "PROCESSING_NEURAL_FLOW..."
            
            # 1. LOGIC: TICKER VS RESEARCH
            if re.match(r'^[A-Z]{1,5}$', query.upper()):
                # FINANCIAL MODE
                ticker = query.upper()
                status.innerText = f"FETCHING_{ticker}_QUANT_DATA..."
                
                # Scraping Yahoo Finance via Proxy (Browser-Safe alternative to yfinance)
                raw_html = await fetch_data(f"https://finance.yahoo.com/quote/{ticker}")
                
                # Simple extraction logic for the browser
                price_match = re.search(r'fin-streamer.*?value="(.*?)"', raw_html)
                price = price_match.group(1) if price_match else "DATA_OFFLINE"
                
                new_card = document.createElement("div")
                new_card.className = "ai-card"
                new_card.innerHTML = f"""
                    <div style="font-size:10px; color:var(--blue); margin-bottom:10px;">FINANCIAL_QUANT_NODE</div>
                    <h1 class="ticker-head">{ticker}</h1>
                    <div class="price-text">${price}</div>
                    <p style="color:#666; font-size:14px; margin-top:10px;">Neural simulation predicts asset volatility based on current liquidity nodes.</p>
                """
                stream.appendChild(new_card)
            
            else:
                # RESEARCH MODE
                status.innerText = "SCANNING_GLOBAL_NODES..."
                
                # Fetching DuckDuckGo HTML via Proxy
                search_url = f"https://html.duckduckgo.com/html/?q={query.replace(' ', '+')}"
                raw_html = await fetch_data(search_url)
                
                # Extract snippets using basic regex (Since BeautifulSoup is heavy for PyScript)
                snippets = re.findall(r'result__snippet.*?>(.*?)</a>', raw_html, re.S)[:3]
                clean_snippets = [re.sub('<[^<]+?>', '', s) for s in snippets]
                
                summary = " ".join(clean_snippets) if clean_snippets else "No high-confidence nodes found."
                
                new_card = document.createElement("div")
                new_card.className = "ai-card"
                new_card.innerHTML = f"""
                    <div style="font-size:10px; color:var(--blue); margin-bottom:10px;">RESEARCH_SYNTHESIS_NODE</div>
                    <h2 style="letter-spacing:-1px;">{query.upper()}</h2>
                    <div style="color:#bbb; line-height:1.6; margin-top:15px; border-left: 2px solid var(--blue); padding-left:20px;">
                        {summary}...
                    </div>
                """
                stream.appendChild(new_card)

            status.innerText = "CORE_IDLE"
            stream.scrollTop = stream.scrollHeight

        # Bind events
        document.querySelector("#user-input").onkeypress = run_engine
    </script>
</body>
</html>
