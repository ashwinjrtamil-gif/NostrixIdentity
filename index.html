<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTRIXAI | Sovereign Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --text: #ffffff; --dim: #8e8e93;
            --blue: #0071e3; --red: #ff3b30;
            /* Exact match for the vertical gradient found in the screenshot */
            --grad: linear-gradient(180deg, #ffffff 0%, #ff3b30 40%, #0071e3 100%);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        /* --- 🖱️ INTERACTIVE --- */
        #cursor { width: 6px; height: 6px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; }
        #aura { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: 0.1s; }

        /* --- 🏗️ THE ENGINE --- */
        .page-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        section { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; padding: 0 10%; position: relative; }
        
        .content { opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); width: 100%; }
        .active .content { opacity: 1; transform: translateY(0); }

        /* --- 🖼️ FIRST PAGE (LOCKED TO SCREENSHOT) --- */
        .hero-h { font-size: clamp(4rem, 12vw, 9.5rem); font-weight: 800; letter-spacing: -6px; line-height: 0.82; text-transform: uppercase; }
        .hero-grad { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; }
        .hero-sub { font-size: 1.1rem; color: var(--dim); letter-spacing: 1px; margin-top: 50px; font-weight: 400; opacity: 0.9; }

        /* --- 📄 MODULE PAGES --- */
        .mono-tag { font-family: 'JetBrains Mono'; color: var(--blue); font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: block; }
        .page-h { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; letter-spacing: -3px; line-height: 1; }
        .para { font-size: 1.25rem; color: var(--dim); line-height: 1.6; max-width: 800px; margin-top: 30px; }

        /* --- 🔘 NAVIGATION --- */
        #dot-nav { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 12px; }
        .dot { width: 4px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.4s; position: relative; }
        .dot.active { background: #fff; transform: scale(3); }
        .dot-label { position: absolute; right: 25px; top: -5px; color: #fff; font-size: 10px; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; font-family: 'JetBrains Mono'; }
        .dot:hover .dot-label { opacity: 0.5; right: 30px; }
    </style>
</head>
<body>

    <div id="cursor"></div><div id="aura"></div>
    <nav id="dot-nav"></nav>

    <div class="page-container" id="main">
        <section class="active">
            <div class="content">
                <h1 class="hero-h">NOSTRIXAI</h1>
                <h1 class="hero-h hero-grad">NATIVE</h1>
                <h1 class="hero-h hero-grad">UNRESTRICTED</h1>
                <p class="hero-sub">4 MILLION TOKENS PER QUERY. Sovereign intelligence. Localized execution.</p>
            </div>
        </section>
    </div>

    <script>
        const uiModules = [
            { t: "CORE DASHBOARD", d: "Centralized interface for real-time system monitoring." },
            { t: "TERMINAL ACCESS", d: "Direct command-line control for localized node execution." },
            { t: "DATA VAULTS", d: "Secure, air-gapped management for proprietary engineering libraries." },
            { t: "CONTEXT EXPLORER", d: "Visual mapping of the 4 million token inference window." },
            { t: "NODE TOPOLOGY", d: "Resource allocation across local hardware clusters." },
            { t: "EDGE MONITORING", d: "Telemetry processing for remote industrial and aerospace sensors." },
            { t: "SECURITY PERIMETER", d: "Privacy enforcement and zero-telemetry protocol settings." },
            { t: "SYSTEM INTEGRITY", d: "Hardware health metrics and silicon utilization tracking." },
            { t: "KNOWLEDGE GRAPH", d: "Relational mapping of multi-domain technical standards." },
            { t: "VERSION CONTROL", d: "Local deployment history and sovereign update management." },
            { t: "ACCESS GATEWAY", d: "Encrypted, permission-based user authentication." },
            { t: "ANALYTICS HUB", d: "Statistical breakdown of system throughput and inference speeds." },
            { t: "RESOURCE ALLOCATOR", d: "Dynamic thread priority and memory buffer management." },
            { t: "USER PREFERENCES", d: "Interface scaling and environmental customization." },
            { t: "DOCUMENT INGESTION", d: "Pipeline for feeding mass technical data into the context giant." },
            { t: "COLLABORATION HUB", d: "Sovereign data transfer and node-to-node synchronization." },
            { t: "SYSTEM ARCHIVE", d: "Long-term storage for validated logic and verified outputs." },
            { t: "INTEGRITY AUDIT", d: "Continuous verification of localized reasoning paths." },
            { t: "FINAL SIGNATURE", d: "Founder executive sign-off and system-wide lockdown." }
        ];

        const container = document.getElementById('main');
        const nav = document.getElementById('dot-nav');

        // Initial Dot
        const startDot = document.createElement('div');
        startDot.className = 'dot active';
        startDot.innerHTML = '<span class="dot-label">START</span>';
        nav.appendChild(startDot);

        uiModules.forEach((mod, i) => {
            const section = document.createElement('section');
            section.innerHTML = `
                <div class="content">
                    <span class="mono-tag">MODULE ${String(i+1).padStart(2, '0')}</span>
                    <h2 class="page-h">${mod.t}</h2>
                    <p class="para">${mod.d}</p>
                </div>`;
            container.appendChild(section);

            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.innerHTML = `<span class="dot-label">${mod.t}</span>`;
            nav.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');
        const sections = document.querySelectorAll('section');
        const cursor = document.getElementById('cursor');
        const aura = document.getElementById('aura');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = aura.style.left = e.clientX + 'px';
            cursor.style.top = aura.style.top = e.clientY + 'px';
            aura.style.transform = 'translate(-50%, -50%)';
        });

        container.addEventListener('scroll', () => {
            const idx = Math.round(container.scrollTop / window.innerHeight);
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
            sections.forEach((s, i) => s.classList.toggle('active', i === idx));
        });
    </script>
</body>
</html>
